<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lost & Found Portal</title>
    <style>
      /* General Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #f4f4f4;
        color: #333;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Navigation Bar */
      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background-color: #23618a;
        color: white;
      }

      .site-info {
        display: flex;
        flex-direction: column;
      }

      .site-name {
        font-weight: bold;
        font-size: 1.2rem;
      }

      .tagline {
        font-size: 0.9rem;
        opacity: 0.9;
      }

      .nav-links {
        display: flex;
        align-items: center;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        margin: 0 10px;
        font-size: 1rem;
      }

      .nav-links a:hover {
        text-decoration: underline;
      }

      /* Auth Button Styling */
      .auth-buttons {
        display: flex;
        align-items: center;
        margin-left: 15px;
      }

      .auth-btn {
        padding: 8px 15px;
        border-radius: 4px;
        text-decoration: none;
        font-weight: bold;
        font-size: 0.9rem;
        transition: all 0.2s ease;
        margin-left: 10px;
      }

      .login-btn {
        color: white;
        background-color: #28a745;
        border: none;
      }

      .login-btn:hover {
        background-color: #218838;
      }

      .signup-btn {
        color: #333;
        background-color: #e9ecef;
        border: none;
      }

      .signup-btn:hover {
        background-color: #dde2e6;
      }
    </style>
  </head>
  <body>
    <nav class="nav-bar">
      <div class="site-info">
        <div class="site-name">Lost & Listed</div>
        <div class="tagline">— Lost it | List it | Find it —</div>
      </div>
      <div class="nav-links">
        <a href="{{url_for('main.all_items')}}">VIEW RECENT POSTS</a>
        <div class="auth-buttons">
          <a href="{{url_for('main.signin')}}" class="auth-btn login-btn"
            >Login</a
          >
          <a href="{{url_for('main.signup')}}" class="auth-btn signup-btn"
            >Sign Up</a
          >
        </div>
      </div>
    </nav>

    <div class="container">
      <h1>Welcome to Lost & Listed</h1>
      <p>Your portal for finding lost and found items in the community.</p>
    </div>
  </body>
</html>
