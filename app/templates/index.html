<!DOCTYPE html>
<html>
<head>
    <title>{{ Auth }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<div class="container" id="container">

    <!-- SIGN UP -->
    <div class="form-container sign-up">
        <form method="POST" action="/signup">
            <h2>Create Account</h2>

            <input type="text" name="signup-firstname" placeholder="First Name" required>
            <input type="text" name="signup-lastname" placeholder="Last Name" required>
            <input type="email" name="signup-email" placeholder="Email" required>
            <div class="passwordbox">
                <input type="password" name="signup-password" id="sign_up_pass" placeholder="Password" required>
                <img src="static/assets/eye-close.png" onclick="togglePassword(this, 'sign_up_pass')">
            </div>
            <button type="submit">Sign Up</button>
        </form>
    </div>

    <!-- SIGN IN -->
    <div class="form-container sign-in">
        <form method="POST" action="/signin">
            <h2>Sign In</h2>

            <input type="email" name="signin-email" placeholder="Email" required>
            <div class="passwordbox">
                <input type="password" name="signin-password" id="sign_in_pass" placeholder="Password" required>
                <img src="static/assets/eye-close.png" onclick="togglePassword(this, 'sign_in_pass')">
            </div>

            <button type="submit">Sign In</button>
        </form>
    </div>

    <!-- TOGGLE PANEL -->
    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel left">
                <img class="logo" src="static/img/ikea.png"></img>
                <h2>Welcome Back!</h2>
                <p>Already have an account?</p>
                <button onclick="showSignIn()">Sign In</button>
            </div>

            <div class="overlay-panel right">
                <img class="logo" src="static/img/ikea.png"></img>
                <h2>Hello, Friend!</h2>
                <p>Create an account to get started</p>
                <button onclick="showSignUp()">Sign Up</button>
            </div>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='js/johnny.js') }}"></script>

</body>
</html>
