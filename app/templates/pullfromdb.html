<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details Toggle</title>
    <style>
        body {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 20px;
        }
        .details-container {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            max-width: 500px;
            transition: box-shadow 0.3s ease, max-height 0.4s ease;
            position: relative;
            overflow: hidden;
            max-height: 80px;
            flex: 1 1 400px;
        }
        .details-container:hover {
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .details-container h2,
        .details-container img {
            position: relative;
            z-index: 1;
        }
        .details-container img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .details-list {
            opacity: 0;
            transition: opacity 0.4s ease-out;
            margin-top: 0;
            list-style: none;
            padding-left: 0;
        }
        .details-container.active {
            max-height: 1000px;
        }
        .details-container.active .details-list {
            opacity: 1;
            margin-top: 15px;
        }
        .details-label {
            font-weight: bold;
            color: #23618A;
        }
        .toggle-arrow {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
            z-index: 2;
        }
        .details-container.active .toggle-arrow {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <!-- Item Details - Backend data fetching removed -->
    <!-- This file previously contained database queries to display found items -->

    <script>
        document.querySelectorAll('.details-container').forEach(container => {
            container.addEventListener('click', function () {
                document.querySelectorAll('.details-container').forEach(el => {
                    if (el !== this) {
                        el.classList.remove('active');
                    }
                });
                this.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
