<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Items</title>
</head>
<body>
  
  <h1>All Items</h1>
  <ul>
    {% for item in items %}

    {% endfor %}
  </ul>

  <a href="{{ url_for('main.logout') }}">Logout</a>

</body>
</html>
