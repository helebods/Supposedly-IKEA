<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insert Item</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/insert_item.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1>Insert Item</h1>
      <form action="/insert" method="POST" enctype="multipart/form-data">
        <!-- PRODUCT INFO -->
        <h3>Product Information</h3>
        <div class="field">
          <input
            type="text"
            name="Product_Name"
            placeholder="Product Name"
            required
          />
          <input
            type="text"
            name="Product_Brand"
            placeholder="Brand"
            required
          />
          <input
            type="text"
            name="Product_Category"
            placeholder="Category"
            required
          />
          <textarea
            name="Product_Description"
            placeholder="Description"
          ></textarea>
          image
          <input type="file" name="Product_Image_URL" />
        </div>

        <!-- LOCATION -->
        <h3>Location</h3>
        <div class="field">
          <input type="text" name="warehouse" placeholder="Warehouse" />
          <input type="text" name="aisle" placeholder="Aisle" />
          <input type="text" name="rack" placeholder="Rack" />
          <input type="text" name="bin" placeholder="Bin" />
        </div>

        <!-- STOCK -->
        <h3>Stock</h3>
        <div class="field">
          <input
            type="number"
            name="quantity"
            placeholder="Quantity"
            required
          />
          <select name="unit">
            <option value="pcs">pcs</option>
            <option value="box">box</option>
            <option value="kg">kg</option></select
          ><br />
          <input
            type="number"
            name="reorder_level"
            placeholder="Reorder Level"
          />
        </div>

        <!-- PRICE -->
        <h3>Price</h3>
        <div class="field">
          <input type="number" step="0.01" name="cost" placeholder="Cost" />
          <input
            type="number"
            step="0.01"
            name="selling_price"
            placeholder="Selling Price"
          />
        </div>
        <!-- SUBMIT -->
        <button type="submit">Add Item</button>
      </form>
    </div>
  </body>
</html>
